version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ai_secretary_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-ai_secretary}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecretpassword}
      POSTGRES_DB: ${DB_NAME:-ai_secretary_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-ai_secretary}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_secretary_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./nodejs_space
      dockerfile: Dockerfile
    container_name: ai_secretary_app
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-ai_secretary}:${DB_PASSWORD:-supersecretpassword}@db:5432/${DB_NAME:-ai_secretary_db}?schema=public
      - SYNC_API_KEY=${SYNC_API_KEY}
      - JIRA_DOMAIN=${JIRA_DOMAIN}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_ACCOUNT_ID=${JIRA_ACCOUNT_ID}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - TICKTICK_ACCESS_TOKEN=${TICKTICK_ACCESS_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DAILY_CAPACITY_MINUTES=${DAILY_CAPACITY_MINUTES:-360}
      - MORNING_CRON=${MORNING_CRON:-'0 10 * * *'}
      - EVENING_CRON=${EVENING_CRON:-'0 21 * * *'}
      - TIMEZONE=${TIMEZONE:-'Europe/Kiev'}
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
